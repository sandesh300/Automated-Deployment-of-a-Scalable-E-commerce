apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: prometheus   
spec:
  namespaceSelector:
    matchNames:
    - ecommerce-prod
  selector:
    matchLabels:
      app: backend
  endpoints:
  - port: http   
    path: /actuator/prometheus
    interval: 15s